services:
  test_db:
    container_name: test-postgres
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: grades_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grades_test"]
      interval: 3s
      timeout: 3s
      retries: 5

  sut:
    container_name: test-web
    build:
      context: .
      target: test
    environment:
      - DB_URL=postgresql+asyncpg://postgres:postgres@test_db:5432/grades_test
    command: sh -c "alembic upgrade head && pytest -v"
    depends_on:
      test_db:
        condition: service_healthy